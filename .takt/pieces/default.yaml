name: default
description: テスト先行開発ピース（計画 → テスト作成 → 実装 → AIアンチパターンレビュー → 並列レビュー → simplifyループ → 完了）
piece_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_movements: 40
initial_movement: plan
loop_monitors:
  - cycle:
      - ai_review
      - ai_fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: |
        ai_review と ai_fix のループが {cycle_count} 回繰り返されました。

        各サイクルのレポートを確認し、このループが健全（進捗がある）か、
        非生産的（同じ問題を繰り返している）かを判断してください。

        **参照するレポート:**
        - AIレビュー結果: {report:ai-review.md}

        **判断基準:**
        - 各サイクルで新しい問題が発見・修正されているか
        - 同じ指摘が繰り返されていないか
        - 修正が実際に反映されているか
      rules:
        - condition: 健全（進捗あり）
          next: ai_review
        - condition: 非生産的（改善なし）
          next: reviewers
  - cycle:
      - reviewers
      - fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-reviewers-fix
      rules:
        - condition: 健全（指摘数が減少、修正が反映されている）
          next: reviewers
        - condition: 非生産的（同じ指摘が繰り返される）
          next: ABORT
  - cycle:
      - simplify_loop
    threshold: 10
    judge:
      persona: supervisor
      instruction: |
        simplify_loop が {cycle_count} 回繰り返されました。

        十分な改善が行われたと判断し、ループを終了してください。
      rules:
        - condition: 十分に改善された
          next: COMPLETE
        - condition: 改善の余地がまだある
          next: simplify_loop
movements:
  - name: plan
    edit: false
    persona: planner
    knowledge: architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    rules:
      - condition: 要件が明確で実装可能
        next: write_tests
      - condition: ユーザーが質問をしている（実装タスクではない）
        next: COMPLETE
      - condition: 要件が不明確、情報不足
        next: ABORT
        appendix: |
          確認事項:
          - {質問1}
          - {質問2}
    instruction: plan
    output_contracts:
      report:
        - name: plan.md
          format: plan
  - name: write_tests
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    knowledge:
      - architecture
      - unit-testing
      - e2e-testing
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    instruction: write-tests-first
    rules:
      - condition: テスト作成が完了した
        next: implement
      - condition: テスト対象が未実装のためテスト作成をスキップする
        next: implement
      - condition: テスト作成を進行できない
        next: ABORT
      - condition: ユーザーへの確認事項があるためユーザー入力が必要
        next: write_tests
        requires_user_input: true
        interactive_only: true
    output_contracts:
      report:
        - name: test-scope.md
          format: coder-scope
        - name: test-decisions.md
          format: coder-decisions
  - name: implement
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    session: refresh
    knowledge:
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    instruction: implement-after-tests
    rules:
      - condition: 実装完了
        next: ai_review
      - condition: 実装未着手（レポートのみ）
        next: ai_review
      - condition: 判断できない、情報不足
        next: ai_review
      - condition: ユーザー入力が必要
        next: implement
        requires_user_input: true
        interactive_only: true
    output_contracts:
      report:
        - name: coder-scope.md
          format: coder-scope
        - name: coder-decisions.md
          format: coder-decisions
  - name: ai_review
    edit: false
    persona: ai-antipattern-reviewer
    policy:
      - review
      - ai-antipattern
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
    instruction: ai-review
    rules:
      - condition: AI特有の問題なし
        next: reviewers
      - condition: AI特有の問題あり
        next: ai_fix
    output_contracts:
      report:
        - name: ai-review.md
          format: ai-review
  - name: ai_fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    session: refresh
    knowledge:
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    instruction: ai-fix
    pass_previous_response: false
    rules:
      - condition: AI Reviewerの指摘に対する修正が完了した
        next: ai_review
      - condition: 修正不要（指摘対象ファイル/仕様の確認済み）
        next: reviewers
      - condition: 修正を進行できない
        next: reviewers
  - name: reviewers
    parallel:
      - name: arch-review
        edit: false
        persona: architecture-reviewer
        policy: review
        knowledge: architecture
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-arch
        output_contracts:
          report:
            - name: architect-review.md
              format: architecture-review
      - name: supervise
        edit: false
        persona: supervisor
        policy: review
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        instruction: supervise
        rules:
          - condition: すべて問題なし
          - condition: 要求未達成、テスト失敗、ビルドエラー
        output_contracts:
          report:
            - name: supervisor-validation.md
              format: supervisor-validation
            - name: summary.md
              format: summary
              use_judge: false
    rules:
      - condition: all("approved", "すべて問題なし")
        next: simplify_loop
      - condition: any("needs_fix", "要求未達成、テスト失敗、ビルドエラー")
        next: fix
  - name: fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    knowledge:
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    instruction: fix
    pass_previous_response: false
    rules:
      - condition: 修正完了
        next: reviewers
      - condition: 判断できない、情報不足
        next: plan
  - name: simplify_loop
    edit: true
    persona: coder
    policy:
      - coding
    session: refresh
    knowledge:
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
    required_permission_mode: edit
    instruction_template: |
      ## Simplify Loop（コード品質改善ループ）

      まず、プロジェクトルートに `.claude/commands/simplify-loop.md` ファイルが存在するか確認してください。

      ### ファイルが存在しない場合
      「simplify-loop.md が見つからないためスキップ」と報告し、完了してください。

      ### ファイルが存在する場合
      以下の手順でコード品質改善を行ってください。

      **あなたはコード品質改善の専門家です。** 最近変更されたコードを対象に、機能を一切変えずに品質を改善します。

      #### レビュー観点
      以下の観点で最近変更されたコードをレビューしてください:

      1. **コードの再利用性**: 重複コードの統合、共通処理の抽出
      2. **品質**: 命名の改善、不要な複雑さの除去、ネストの削減、冗長なコードの除去
      3. **効率性**: 不要な処理や無駄なアロケーションの削減
      4. **一貫性**: プロジェクトの既存コードスタイルとの一貫性

      #### 改善時のルール
      - **機能を変えない**: 動作・出力・振る舞いは完全に保持すること
      - **明快さ優先**: 行数削減よりも読みやすさを優先する。ネストした三項演算子は使わない
      - **過度な抽象化をしない**: 1回しか使わない処理をヘルパー関数にしない
      - **最近変更されたコードのみ対象**: 明示的に指示されない限り、他のコードには手を出さない

      #### 手順
      1. git diff で最近の変更ファイルを特定する
      2. 変更されたコードをレビューし、改善点を洗い出す
      3. 見つかった問題を修正する（テストコードも、テストを無効化しない修正であれば修正してよい）
      4. 修正後、再度レビューしてまだ問題が残っていないか確認する
      5. 問題が見つからなくなるまでこのサイクルを繰り返す
    rules:
      - condition: simplify-loop.md が見つからないためスキップ
        next: COMPLETE
      - condition: すべての問題が解消された
        next: COMPLETE
      - condition: まだ改善の余地がある
        next: simplify_loop
